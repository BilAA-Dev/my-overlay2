<!DOCTYPE html>
<html style="background: transparent;">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent !important; overflow: hidden; }
        #wrapper { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; aspect-ratio: 16 / 9; object-fit: contain; }
    </style>
</head>
<body onclick="playVideo()">
    <div id="wrapper">
        <video id="myVideo" autoplay loop muted playsinline src="overlayy.webm"></video>
    </div>
    <script>
        function playVideo() {
            var vid = document.getElementById("myVideo");
            vid.play();
        }
        // Simulasi klik untuk menjalankan video
        window.onload = function() {
            document.body.click();
        };
    </script>
</body>
</html>
